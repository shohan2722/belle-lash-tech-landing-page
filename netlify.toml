[build]
  publish = "."
  command = ""

[context.production]
  environment = { NODE_ENV = "production" }

[[redirects]]
  from = "/request-info"
  to = "/lash-tech-request-info.html"
  status = 200

[[redirects]]
  from = "/thank-you"
  to = "/lash-tech-thank-you.html"
  status = 200

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-XSS-Protection = "1; mode=block"
